<!-- Breadcrumb Navigation -->
{% if breadcrumbs %}
<nav class="flex items-center gap-2 text-sm mb-0 overflow-x-auto py-0 ml-4">
    {% for item in breadcrumbs %}
        {% if item.url %}
        <a href="{{ item.url }}" class="inline-flex items-center gap-1 text-primary hover:text-primary/80 hover:underline whitespace-nowrap font-medium transition-colors">
            <span class="material-symbols-outlined text-base">folder</span>
            <span>{{ item.label }}</span>
        </a>
        {% else %}
        <span class="inline-flex items-center gap-1 text-slate-700 dark:text-slate-300 whitespace-nowrap font-medium">
            <span class="material-symbols-outlined text-base">description</span>
            <span>{{ item.label }}</span>
        </span>
        {% endif %}
        {% if not loop.last %}
        <span class="text-slate-300 dark:text-slate-600 flex-shrink-0 text-lg">›</span>
        {% endif %}
    {% endfor %}
</nav>
{% endif %}
