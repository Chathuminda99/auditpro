<tr class="border-b border-slate-100 dark:border-slate-700 bg-primary/5 dark:bg-primary/10 transition-colors"
    data-obs-id="{{ obs.id }}">
    <td class="px-4 py-3 text-sm align-top">
        <textarea name="observation_text" rows="3"
            class="w-full px-3 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-900 dark:text-white rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-y">{{ obs.observation_text }}</textarea>
    </td>
    <td class="px-4 py-3 text-sm align-top">
        <textarea name="recommendation_text" rows="3"
            class="w-full px-3 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-y">{{ obs.recommendation_text }}</textarea>
    </td>
    <td class="px-4 py-3 text-sm align-top">
        <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300">
            <span class="material-symbols-outlined text-[12px]">attach_file</span>
            {{ obs.evidence_files|length }} file{{ 's' if obs.evidence_files|length != 1 else '' }}
        </span>
    </td>
    <td class="px-4 py-3 text-center align-top">
        <div class="flex items-center justify-center gap-2">
            <button type="button"
                hx-post="/projects/{{ project.id }}/observations/{{ obs.id }}/update"
                hx-include="closest tr"
                hx-target="closest tr" hx-swap="outerHTML"
                class="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-bold text-white bg-primary hover:bg-primary/90 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-primary/50">
                <span class="material-symbols-outlined text-[14px]">save</span>
                Save
            </button>
            <button type="button"
                hx-get="/projects/{{ project.id }}/observations/{{ obs.id }}/row"
                hx-target="closest tr" hx-swap="outerHTML"
                class="inline-flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 rounded-lg transition-colors">
                <span class="material-symbols-outlined text-[14px]">close</span>
                Cancel
            </button>
        </div>
    </td>
</tr>
