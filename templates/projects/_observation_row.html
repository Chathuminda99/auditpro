<tr class="border-b border-slate-100 dark:border-slate-700 hover:bg-slate-50/80 dark:hover:bg-slate-800/50 transition-colors"
    data-obs-id="{{ obs.id }}">
    <td class="px-6 py-4 text-sm text-slate-900 dark:text-white break-words">{{ obs.observation_text }}</td>
    <td class="px-6 py-4 text-sm text-slate-700 dark:text-slate-300 break-words">{{ obs.recommendation_text }}</td>
    <td class="px-6 py-4 text-sm">
        <button type="button"
            hx-get="/projects/{{ project.id }}/observations/{{ obs.id }}/evidence"
            hx-target="#modal-body" hx-swap="innerHTML" @click="$store.modal.show()"
            class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 hover:bg-blue-200 dark:hover:bg-blue-800/50 transition-colors cursor-pointer">
            <span class="material-symbols-outlined text-[12px]">attach_file</span>
            {{ obs.evidence_files|length }} file{{ 's' if obs.evidence_files|length != 1 else '' }}
        </button>
    </td>
    <td class="px-6 py-4 text-center">
        <div class="flex items-center justify-center gap-2">
            <button type="button"
                hx-get="/projects/{{ project.id }}/observations/{{ obs.id }}/row/edit"
                hx-target="closest tr" hx-swap="outerHTML"
                class="text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary transition-colors"
                title="Edit observation">
                <span class="material-symbols-outlined text-[20px]">edit</span>
            </button>
            <button type="button" @click="deleteObservation('{{ obs.id }}')"
                class="text-slate-600 dark:text-slate-400 hover:text-red-600 dark:hover:text-red-400 transition-colors"
                title="Delete observation">
                <span class="material-symbols-outlined text-[20px]">delete</span>
            </button>
        </div>
    </td>
</tr>
