<div class="p-6">
  <h2 class="text-xl font-semibold text-slate-900 dark:text-white mb-4">Create Asset Session</h2>

  <form hx-post="/projects/{{ project.id }}/review-scopes/{{ review_scope.id }}/sessions" hx-target="#sessions-list" hx-swap="innerHTML" @htmx:afterRequest="if($event.detail.xhr.status === 200) $store.modal.hide()" class="space-y-4">
    <!-- Session Name -->
    <div>
      <label for="name" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
        Session Name <span class="text-red-500">*</span>
      </label>
      <input type="text" id="name" name="name" required
        placeholder="e.g., Production Web App, Database Server 192.168.1.10"
        class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary">
    </div>

    <!-- Asset Identifier -->
    <div>
      <label for="asset_identifier" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
        Asset Identifier
      </label>
      <input type="text" id="asset_identifier" name="asset_identifier"
        placeholder="e.g., 10.0.1.5 or app.example.com"
        class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary">
    </div>

    <!-- Description -->
    <div>
      <label for="description" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
        Description
      </label>
      <textarea id="description" name="description" rows="3"
        placeholder="Additional context or notes about this session..."
        class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary resize-none"></textarea>
    </div>

    <!-- Buttons -->
    <div class="flex items-center gap-2 pt-4 border-t border-slate-200 dark:border-slate-700">
      <button type="button" @click="$store.modal.hide()"
        class="px-3 py-2 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
        Cancel
      </button>
      <button type="submit"
        class="ml-auto px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white hover:opacity-90 transition-opacity">
        Create Session
      </button>
    </div>
  </form>
</div>
