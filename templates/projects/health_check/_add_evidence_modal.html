<div class="p-6" x-data="{ tab: '{{ initial_tab }}' }">
  <h2 class="text-xl font-semibold text-slate-900 dark:text-white mb-4">Add Evidence</h2>

  <!-- Tab Buttons -->
  <div class="flex gap-2 mb-6 border-b border-slate-200 dark:border-slate-700">
    <button @click="tab = 'text_note'" :class="'px-3 py-2 text-sm font-medium border-b-2 transition-colors ' + (tab === 'text_note' ? 'border-primary text-primary' : 'border-transparent text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200')"
      type="button">
      <span class="material-symbols-outlined text-[16px] inline mr-1">notes</span>
      Text Note
    </button>
    <button @click="tab = 'file'" :class="'px-3 py-2 text-sm font-medium border-b-2 transition-colors ' + (tab === 'file' ? 'border-primary text-primary' : 'border-transparent text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-200')"
      type="button">
      <span class="material-symbols-outlined text-[16px] inline mr-1">upload_file</span>
      Upload File
    </button>
  </div>

  <!-- Text Note Tab -->
  <form x-show="tab === 'text_note'" hx-post="/projects/{{ project.id }}/review-scopes/{{ session.review_scope.id }}/sessions/{{ session.id }}/evidence?instance_id={{ instance.id }}"
    hx-target="#evidence-list-{{ instance.id }}" hx-swap="innerHTML"
    @submit="$store.modal.hide()"
    class="space-y-4">
    <input type="hidden" name="evidence_type" value="text_note">
    <div>
      <label for="content" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
        Note Content <span class="text-red-500">*</span>
      </label>
      <textarea id="content" name="content" required rows="6"
        placeholder="Document your findings, test results, screenshots description, or compliance notes..."
        class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary resize-none"></textarea>
    </div>
    <div class="flex items-center gap-2 pt-4 border-t border-slate-200 dark:border-slate-700">
      <button type="button" @click="$store.modal.hide()"
        class="px-3 py-2 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
        Cancel
      </button>
      <button type="submit"
        class="ml-auto px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white hover:opacity-90 transition-opacity">
        Save Note
      </button>
    </div>
  </form>

  <!-- File Upload Tab -->
  <form x-show="tab === 'file'" hx-post="/projects/{{ project.id }}/review-scopes/{{ session.review_scope.id }}/sessions/{{ session.id }}/evidence?instance_id={{ instance.id }}"
    hx-target="#evidence-list-{{ instance.id }}" hx-swap="innerHTML"
    hx-encoding="multipart/form-data"
    @submit="$store.modal.hide()"
    class="space-y-4">
    <input type="hidden" name="evidence_type" value="file">
    <div>
      <label for="file" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">
        Select File <span class="text-red-500">*</span>
      </label>
      <input type="file" id="file" name="file" required accept=".png,.jpg,.jpeg,.gif,.webp,.pdf"
        class="w-full px-3 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 text-slate-900 dark:text-white file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-primary file:text-white hover:file:opacity-90 focus:outline-none focus:ring-2 focus:ring-primary">
      <p class="text-xs text-slate-500 dark:text-slate-400 mt-2">
        Supported formats: PNG, JPG, GIF, WebP, PDF (Max 50 MB)
      </p>
    </div>
    <div class="flex items-center gap-2 pt-4 border-t border-slate-200 dark:border-slate-700">
      <button type="button" @click="$store.modal.hide()"
        class="px-3 py-2 rounded-lg text-sm font-medium text-slate-700 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
        Cancel
      </button>
      <button type="submit"
        class="ml-auto px-4 py-2 rounded-lg text-sm font-medium bg-primary text-white hover:opacity-90 transition-opacity">
        Upload
      </button>
    </div>
  </form>
</div>
