{% extends "base.html" %}

{% block title %}AuditPro - Something Went Wrong{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4">
  <div class="w-24 h-24 bg-red-50 dark:bg-red-900/20 rounded-full flex items-center justify-center text-red-500 mb-6 mx-auto">
    <span class="material-symbols-outlined text-[48px]">error</span>
  </div>
  <h1 class="text-4xl font-bold text-slate-900 dark:text-white mb-3">Something Went Wrong</h1>
  <p class="text-slate-500 dark:text-slate-400 max-w-sm mb-8">
    An unexpected error occurred on our end. If this keeps happening, please contact your administrator.
  </p>
  <a href="/dashboard"
    class="px-6 py-2.5 bg-primary text-white font-bold rounded-lg hover:bg-primary/90 transition-colors">
    Back to Dashboard
  </a>
</div>
{% endblock %}
